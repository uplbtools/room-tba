name: E2E advisory

# Same PR triggers as blocking E2E; non-blocking (continue-on-error).

on:
  pull_request:
    types: [opened, ready_for_review, reopened, labeled]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"

concurrency:
  group: e2e-advisory-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e-advisory:
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event.action == 'ready_for_review' ||
      (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
      (github.event.action == 'reopened' && github.event.pull_request.draft == false) ||
      (github.event.action == 'labeled' && github.event.label.name == 'run/e2e'))
    uses: ./.github/workflows/e2e-reusable.yml
    secrets: inherit
    with:
      suite: advisory
