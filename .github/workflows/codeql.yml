name: CodeQL

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging
  schedule:
    # Weekly security scan (Monday 06:00 UTC)
    - cron: "0 6 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended adds extra query packs beyond default
          queries: security-extended

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12" # pin: bun 1.3.14 broke --frozen-lockfile

      - name: Install dependencies
        run: mkdir -p node_modules && bun install --frozen-lockfile

      # Astro SSG queries Postgres at build time — skip `bun run build` in CI.
      # Source-level JS/TS analysis still covers app logic, API routes, and libs.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
