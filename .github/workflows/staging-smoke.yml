name: Staging smoke

# Read-only Playwright against live staging URL (non-blocking).
# Full mutating E2E on staging branch: e2e-staging.yml (push + nightly).

on:
  push:
    branches:
      - staging

jobs:
  staging-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      STAGING_BASE_URL: https://staging.room-tba.uplbtools.me
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12" # pin: bun 1.3.14 broke --frozen-lockfile
      - run: mkdir -p node_modules && bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps
      - run: bun run e2e:staging
