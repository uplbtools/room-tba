name: "PR Checks"
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Validate Closing Keywords
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if ! echo "$BODY" | grep -iqE "(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved) #[0-9]+"; then
            echo "Error: PR body must contain a closing keyword (e.g., 'Closes #123')"
            exit 1
          fi
