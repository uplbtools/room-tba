name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"
  push:
    branches:
      - main
      - staging
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".cursor/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier
        run: bunx prettier --check .

      - name: ESLint
        run: bunx eslint .

      - name: Unit tests
        run: bun test src/lib src/constants --path-ignore-patterns='**/*.store.test.ts'

      - name: Component tests
        run: bun run test:components

      - name: PWA legal route guardrails
        run: bun run check:pwa-legal

      - name: Build
        env:
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
        run: bun run build

  migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Schema tables present
        env:
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
        run: bun run check:migrations

  integration:
    runs-on: ubuntu-latest
    needs: [verify, migrations]
    env:
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_ADMIN_SESSION_SECRET: ${{ secrets.E2E_ADMIN_SESSION_SECRET }}
      ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.E2E_ADMIN_SESSION_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Reset E2E database
        run: bun run e2e:reset-db

      - name: Build for preview
        run: bun run build

      - name: Integration tests
        run: |
          bun run preview -- --host 127.0.0.1 --port 4321 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:4321/api/health && break
            sleep 2
          done
          PREVIEW_BASE_URL=http://127.0.0.1:4321 bun run test:integration
