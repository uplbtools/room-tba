name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: "${{ !contains(github.event.head_commit.message, '[skip ci]') }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12" # pin: bun 1.3.14 broke --frozen-lockfile

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release

      - name: Read release version
        id: pkg
        run: |
          if git diff --quiet HEAD -- package.json CHANGELOG.md; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No version bump — skipping sync PR."
          else
            version=$(node -p "require('./package.json').version")
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "Release ${version} — opening sync PR."
          fi

      - name: Open version sync PR
        if: steps.pkg.outputs.published == 'true'
        continue-on-error: true
        id: sync_pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(release): ${{ steps.pkg.outputs.version }} [skip ci]"
          title: "chore(release): ${{ steps.pkg.outputs.version }}"
          body: |
            Sync `package.json` and `CHANGELOG.md` after semantic-release published the GitHub release.

            Merge to keep in-app version labels and `/changelog` up to date. The commit includes `[skip ci]` so this merge does not re-run release.
          branch: chore/release-${{ steps.pkg.outputs.version }}-${{ github.run_id }}
          delete-branch: true
          add-paths: |
            CHANGELOG.md
            package.json

      - name: Auto-merge version sync PR
        if: steps.pkg.outputs.published == 'true' && steps.sync_pr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.sync_pr.outputs.pull-request-number }}" \
            --repo "${{ github.repository }}" --squash --auto \
          || echo "::warning::Could not enable auto-merge on the sync PR — merge it manually, and enable repo Settings > General > Pull Requests > 'Allow auto-merge'."

      - name: Version sync PR failed
        if: steps.pkg.outputs.published == 'true' && steps.sync_pr.outcome == 'failure'
        run: |
          echo "::warning::Could not open version sync PR (org may block Actions from creating PRs). Open a manual chore(release): ${{ steps.pkg.outputs.version }} [skip ci] PR for package.json and CHANGELOG.md."
